name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xorg \
            libx11-dev \
            libxext-dev \
            libbsd-dev \
            zlib1g-dev \
            libcriterion-dev \
            valgrind \
            xvfb

      - name: Install MiniLibX
        run: |
          git clone --depth 1 https://github.com/42Paris/minilibx-linux.git /tmp/minilibx-linux
          make -C /tmp/minilibx-linux
          sudo cp /tmp/minilibx-linux/mlx.h /usr/local/include/
          sudo cp /tmp/minilibx-linux/libmlx.a /usr/local/lib/
          sudo ldconfig

      - name: Build cub3D
        run: make

      - name: Clone Cub3D tester
        run: |
          git clone --depth 1 https://github.com/VestaManuyko/Cub3D_tester.git tester
          make -C tester

      - name: Run Cub3D tester invalid suite
        run: make -C tester invalid

      - name: Run local map suites
        run: make test-maps

      - name: Run parser under valgrind
        run: make valgrind-parser
